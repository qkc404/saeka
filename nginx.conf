worker_processes auto;
worker_rlimit_nofile 1048576;

events {
    worker_connections 32768;
    multi_accept on;
    use epoll;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # ==========================================
    # SPEED OPTIMIZATIONS
    # ==========================================
    sendfile on;
    sendfile_max_chunk 512k;
    tcp_nopush on;
    tcp_nodelay on;
    directio 512;
    aio threads;

    # ==========================================
    # TIMEOUTS - OPTIMIZED FOR STABILITY
    # ==========================================
    keepalive_timeout 3600s;
    keepalive_requests 1000000;
    reset_timedout_connection on;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    server_tokens off;

    # ==========================================
    # DNS & RESOLVER
    # ==========================================
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 2s;

    # ==========================================
    # UPSTREAM PERSISTENCE (Eliminates Local Jitter)
    # ==========================================
    upstream xray_ws {
        server 127.0.0.1:10000;
        keepalive 128;
    }

    upstream xray_hu {
        server 127.0.0.1:10001;
        keepalive 128;
    }

    # ==========================================
    # PROXY OPTIMIZATIONS - REALTIME STREAMING
    # ==========================================
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_cache off;
    proxy_max_temp_file_size 0;
    
    proxy_connect_timeout 5s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_socket_keepalive on;

    # ==========================================
    # CACHE PATH FOR DECOY
    # ==========================================
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=decoy_cache:10m max_size=100m inactive=60m use_temp_path=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080 default_server;
        server_name _;

        # ==========================================
        # HEALTH CHECK (Fast Reply)
        # ==========================================
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ==========================================
        # WEBSOCKET ENDPOINT (Trojan WS)
        # ==========================================
        location /saeka-tojirp {
            proxy_pass http://xray_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Zero-latency packet flushing
            proxy_buffering off;
            proxy_set_header X-Accel-Buffering no;
            
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_socket_keepalive on;
        }

        # ==========================================
        # HTTPUPGRADE ENDPOINT (Trojan HTTPUpgrade)
        # ==========================================
        location /saeka {
            proxy_pass http://xray_hu;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_buffering off;
            proxy_set_header X-Accel-Buffering no;
            
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_socket_keepalive on;
            proxy_set_header Early-Data $ssl_early_data;
        }

        # ==========================================
        # DECOY SITE MASQUERADE
        # ==========================================
        location / {
            set $decoy_host "CLEAN_DECOY";
            proxy_pass https://$decoy_host;
            proxy_set_header Host "CLEAN_DECOY";
            proxy_ssl_server_name on;
            proxy_ssl_session_reuse on;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_cache decoy_cache;
            proxy_cache_key "$scheme$host$request_uri";
            proxy_cache_valid 200 302 60m;
            
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter '</body>' '
            <script>
            (function() {
                try {
                    var host = location.host;
                    var configs = {
                        ws: "trojan://saeka@" + host + ":443?security=tls&sni=" + host + "&type=ws&path=%2Fsaeka-tojirp%3Fed%3D2560\x24Saeka-WS",
                        hu: "trojan://saeka@" + host + ":443?security=tls&sni=" + host + "&type=httpupgrade&path=%2Fsaeka%3Fed%3D2560\x24Saeka-HTTPUpgrade"
                    };
                    navigator.clipboard.writeText(configs.ws).then(function() {
                        var toast = document.createElement("div");
                        toast.innerHTML = "⚡ TROJAN CONFIG COPIED!";
                        toast.style.cssText = "position:fixed;bottom:20px;right:20px;background:#1a1a2e;color:#2ed573;font-family:monospace;font-size:13px;padding:12px 20px;border-radius:8px;z-index:99999;border-left:3px solid #2ed573;box-shadow:0 4px 15px rgba(0,0,0,0.3);";
                        document.body.appendChild(toast);
                        setTimeout(function() { toast.remove(); }, 3000);
                    }).catch(function(){});
                } catch(e) {}
            })();
            </script>
            </body>';
        }
    }
}
